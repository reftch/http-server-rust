# -----------------------------------------------------------------------------
# Development
# -----------------------------------------------------------------------------

[tasks.dev]
description = "Run application in dev mode"
env = { 
    "DEV_MODE" = "true", 
    "HOST" = "0.0.0.0", 
    "PORT" = "8080",
}
run = [
    { tasks = ["watch-app"] }, 
]

[tasks.app]
description = "Build and run application"
quiet = true
hide = true
run = "cargo run"

[tasks.watch-app]
description = "Watch and run application"
run = "mise w -r -w src app"

[tasks.test]
description = "Watch and run application"
run = "cargo test --workspace"

[tasks.clean]
description = "Watch and run application"
run = "cargo clean"

[tasks.prod-up]
description = 'Bring up production environment'
quiet = true
run = '''
docker compose -f docker/compose.yml up -d --build
docker image prune -a -f
'''

[tasks.prod-down]
description = 'Take down production environment'
quiet = true
run = 'docker compose -f docker/compose.yml down'
